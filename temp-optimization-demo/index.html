<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kmeng AI Animata - 主工作区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'slate-50': '#fafafa',
                        'slate-100': '#f4f4f5',
                        'slate-200': '#e4e4e7',
                        'slate-300': '#d4d4d8',
                        'slate-400': '#a1a1aa',
                        'slate-500': '#71717a',
                        'slate-600': '#52525b',
                        'slate-700': '#3f3f46',
                        'slate-800': '#27272a',
                        'slate-850': '#202023',
                        'slate-900': '#18181b',
                        'slate-950': '#09090b',
                        'indigo-500': '#3b82f6',
                        'indigo-600': '#2563eb',
                        'indigo-700': '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #ECEDEE;
            transition: colors 0.3s;
        }
        .dark {
            background-color: #050505;
            color: #ECEDEE;
        }
        .bg-content1 {
            background-color: #18181b;
        }
        .bg-content2 {
            background-color: #27272a;
        }
        .bg-content3 {
            background-color: #3f3f46;
        }
        .text-foreground {
            color: #ECEDEE;
        }
        .text-primary {
            color: #3870e7;
        }
        .border-content3 {
            border-color: #3f3f46;
        }
        .timeline-track {
            height: 80px;
            border-bottom: 1px solid #3f3f46;
        }
        .timeline-clip {
            background-color: #3b82f6;
            border-radius: 4px;
            height: 60px;
            margin: 10px 0;
            position: relative;
            cursor: pointer;
        }
        .timeline-clip:hover {
            background-color: #2563eb;
        }
        .timeline-clip.audio {
            background-color: #10b981;
        }
        .timeline-clip.audio:hover {
            background-color: #059669;
        }
        .timeline-ruler {
            height: 20px;
            border-bottom: 1px solid #3f3f46;
        }
        .timeline-ruler-marks {
            display: flex;
            height: 100%;
        }
        .timeline-ruler-mark {
            flex: 1;
            border-right: 1px solid #3f3f46;
            position: relative;
        }
        .timeline-ruler-mark::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1px;
            height: 5px;
            background-color: #a1a1aa;
        }
        .sidebar-tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #3f3f46;
        }
        .sidebar-tab.active {
            background-color: #3f3f46;
            border-left: 3px solid #3b82f6;
        }
        .asset-item {
            width: 120px;
            height: 80px;
            background-color: #27272a;
            border-radius: 4px;
            margin: 8px;
            cursor: pointer;
            position: relative;
        }
        .asset-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .asset-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body class="dark">
    <!-- 顶部导航栏 -->
    <nav class="bg-slate-900 h-16 flex items-center justify-between px-6">
        <div class="flex items-center">
            <button class="mr-4 text-slate-400 hover:text-foreground">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold text-foreground">Kmeng AI Animata</h1>
            <span class="ml-4 text-sm text-slate-400">项目: 科幻小说改编</span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="text-slate-400 hover:text-foreground">
                <i class="fas fa-moon"></i>
            </button>
            <button class="text-slate-400 hover:text-foreground">
                <i class="fas fa-language"></i>
            </button>
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                <i class="fas fa-play mr-2"></i>预览
            </button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="flex h-[calc(100vh-4rem)]">
        <!-- 左侧边栏 -->
        <div class="w-64 bg-content1 border-r border-content3">
            <div class="p-4 border-b border-content3">
                <h2 class="text-lg font-semibold text-foreground">资产库</h2>
            </div>
            <div class="sidebar-tab active">
                <i class="fas fa-film mr-2"></i>视频片段
            </div>
            <div class="sidebar-tab">
                <i class="fas fa-music mr-2"></i>音频资源
            </div>
            <div class="sidebar-tab">
                <i class="fas fa-image mr-2"></i>图片素材
            </div>
            <div class="sidebar-tab">
                <i class="fas fa-user mr-2"></i>角色
            </div>
            <div class="sidebar-tab">
                <i class="fas fa-map mr-2"></i>场景
            </div>
            <div class="sidebar-tab">
                <i class="fas fa-box mr-2"></i>物品
            </div>
        </div>

        <!-- 中间内容区 -->
        <div class="flex-1 flex flex-col">
            <!-- 工具栏 -->
            <div class="bg-content1 border-b border-content3 p-4">
                <div class="flex space-x-4">
                    <button class="bg-content2 hover:bg-content3 px-3 py-1 rounded">
                        <i class="fas fa-cut mr-1"></i>剪切
                    </button>
                    <button class="bg-content2 hover:bg-content3 px-3 py-1 rounded">
                        <i class="fas fa-copy mr-1"></i>复制
                    </button>
                    <button class="bg-content2 hover:bg-content3 px-3 py-1 rounded">
                        <i class="fas fa-paste mr-1"></i>粘贴
                    </button>
                    <button class="bg-content2 hover:bg-content3 px-3 py-1 rounded">
                        <i class="fas fa-trash mr-1"></i>删除
                    </button>
                    <div class="flex-1"></div>
                    <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-magic mr-2"></i>智能推荐
                    </button>
                </div>
            </div>

            <!-- 预览窗口 -->
            <div class="flex-1 bg-slate-950 flex items-center justify-center">
                <div class="w-3/4 aspect-video bg-content2 rounded-lg overflow-hidden">
                    <div class="w-full h-full flex items-center justify-center">
                        <i class="fas fa-play-circle text-6xl text-slate-500"></i>
                    </div>
                </div>
            </div>

            <!-- 时间线 -->
            <div class="h-96 bg-content1 border-t border-content3">
                <!-- 时间线标尺 -->
                <div class="timeline-ruler">
                    <div class="timeline-ruler-marks">
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                        <div class="timeline-ruler-mark"></div>
                    </div>
                </div>

                <!-- 视频轨道 -->
                <div class="timeline-track">
                    <div class="flex items-center h-full px-4">
                        <div class="w-40 text-sm text-slate-400">视频 1</div>
                        <div class="flex-1 relative">
                            <div class="timeline-clip" style="width: 150px; margin-left: 20px;">
                                <div class="absolute top-2 left-2 text-xs text-white">场景 1</div>
                            </div>
                            <div class="timeline-clip" style="width: 200px; margin-left: 200px;">
                                <div class="absolute top-2 left-2 text-xs text-white">场景 2</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 音频轨道 -->
                <div class="timeline-track">
                    <div class="flex items-center h-full px-4">
                        <div class="w-40 text-sm text-slate-400">音频 1</div>
                        <div class="flex-1 relative">
                            <div class="timeline-clip audio" style="width: 330px; margin-left: 20px;">
                                <div class="absolute top-2 left-2 text-xs text-white">背景音乐</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 音频轨道 2 -->
                <div class="timeline-track">
                    <div class="flex items-center h-full px-4">
                        <div class="w-40 text-sm text-slate-400">音频 2</div>
                        <div class="flex-1 relative">
                            <div class="timeline-clip audio" style="width: 80px; margin-left: 20px;">
                                <div class="absolute top-2 left-2 text-xs text-white">音效 1</div>
                            </div>
                            <div class="timeline-clip audio" style="width: 60px; margin-left: 250px;">
                                <div class="absolute top-2 left-2 text-xs text-white">音效 2</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧属性面板 -->
        <div class="w-80 bg-content1 border-l border-content3">
            <div class="p-4 border-b border-content3">
                <h2 class="text-lg font-semibold text-foreground">属性</h2>
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">片段名称</label>
                    <input type="text" class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">开始时间</label>
                    <input type="text" class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground" value="00:00:00">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">结束时间</label>
                    <input type="text" class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground" value="00:00:15">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">音量</label>
                    <input type="range" class="w-full" min="0" max="100" value="80">
                </div>
                <div class="mt-6">
                    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-edit mr-2"></i>编辑片段
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟交互
        document.querySelectorAll('.sidebar-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
