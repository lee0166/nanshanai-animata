<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分镜图片生成界面 - 参考图风格</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #0f0f0f;
        color: #fff;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        display: flex;
        height: 100vh;
      }

      /* 左侧分镜导航 */
      .sidebar-left {
        width: 240px;
        background: #1a1a1a;
        border-right: 1px solid #333;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid #333;
      }

      .sidebar-title {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }

      .sidebar-subtitle {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }

      .shot-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }

      .shot-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 8px;
      }

      .shot-item:hover {
        background: #252525;
      }

      .shot-item.active {
        background: #2a2a2a;
        border: 1px solid #ff6b35;
      }

      .shot-thumb {
        width: 48px;
        height: 36px;
        border-radius: 4px;
        background: #333;
        overflow: hidden;
        flex-shrink: 0;
      }

      .shot-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .shot-info {
        flex: 1;
        min-width: 0;
      }

      .shot-number {
        font-size: 12px;
        font-weight: 600;
        color: #ff6b35;
      }

      .shot-name {
        font-size: 12px;
        color: #ccc;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .shot-status {
        font-size: 10px;
        color: #4ade80;
        margin-top: 2px;
      }

      /* 中央预览区 */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #0f0f0f;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-bottom: 1px solid #333;
        background: #1a1a1a;
      }

      .shot-title {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .shot-id {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
      }

      .shot-scene {
        font-size: 14px;
        color: #ccc;
      }

      .top-actions {
        display: flex;
        gap: 8px;
      }

      .btn {
        padding: 6px 16px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #ff6b35;
        color: #fff;
      }

      .btn-primary:hover {
        background: #ff8555;
      }

      .btn-secondary {
        background: #333;
        color: #ccc;
      }

      .btn-secondary:hover {
        background: #444;
      }

      .preview-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        position: relative;
        padding: 40px;
      }

      .preview-image {
        max-width: 100%;
        max-height: 60vh;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      .preview-placeholder {
        width: 600px;
        height: 400px;
        background: #1a1a1a;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #666;
      }

      .preview-placeholder svg {
        width: 48px;
        height: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      /* 悬浮工具栏 */
      .floating-toolbar {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        padding: 8px;
        border-radius: 100px;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .preview-area:hover .floating-toolbar {
        opacity: 1;
      }

      .toolbar-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 100px;
        background: transparent;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .toolbar-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .toolbar-btn.primary {
        background: #ff6b35;
      }

      .toolbar-btn.primary:hover {
        background: #ff8555;
      }

      /* 关键帧指示器 */
      .keyframe-indicator {
        position: absolute;
        top: 24px;
        right: 24px;
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 14px;
        font-weight: 500;
      }

      /* 描述区 */
      .description-bar {
        padding: 16px 24px;
        background: #1a1a1a;
        border-top: 1px solid #333;
      }

      .description-text {
        font-size: 13px;
        color: #aaa;
        line-height: 1.6;
      }

      /* 底部历史栏 */
      .history-bar {
        padding: 12px 24px;
        background: #141414;
        border-top: 1px solid #333;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .history-label {
        font-size: 12px;
        color: #888;
        white-space: nowrap;
      }

      .history-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        flex: 1;
      }

      .history-item {
        width: 64px;
        height: 48px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s;
        flex-shrink: 0;
        position: relative;
      }

      .history-item:hover {
        border-color: #555;
      }

      .history-item.active {
        border-color: #ff6b35;
      }

      .history-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .history-item .version-num {
        position: absolute;
        top: 2px;
        left: 2px;
        background: rgba(0, 0, 0, 0.7);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        color: #fff;
      }

      .add-btn {
        width: 64px;
        height: 48px;
        border-radius: 6px;
        border: 2px dashed #444;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #666;
        flex-shrink: 0;
      }

      .add-btn:hover {
        border-color: #666;
        color: #888;
      }

      /* 右侧面板 */
      .sidebar-right {
        width: 320px;
        background: #1a1a1a;
        border-left: 1px solid #333;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .panel-section {
        padding: 20px;
        border-bottom: 1px solid #333;
      }

      .panel-title {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 12px;
      }

      /* 角色信息 */
      .character-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .character-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: #252525;
        border-radius: 8px;
      }

      .character-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #333;
        overflow: hidden;
      }

      .character-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .character-info {
        flex: 1;
      }

      .character-name {
        font-size: 13px;
        color: #fff;
      }

      .character-role {
        font-size: 11px;
        color: #888;
      }

      /* 场景信息 */
      .scene-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: #252525;
        border-radius: 8px;
      }

      .scene-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #2a3f2a;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4ade80;
      }

      /* 提示词编辑 */
      .prompt-box {
        background: #252525;
        border-radius: 8px;
        padding: 12px;
      }

      .prompt-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .prompt-label {
        font-size: 11px;
        color: #888;
      }

      .prompt-actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        background: transparent;
        border: none;
        color: #888;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-btn:hover {
        background: #333;
        color: #fff;
      }

      .prompt-textarea {
        width: 100%;
        min-height: 100px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 10px;
        color: #ccc;
        font-size: 12px;
        line-height: 1.6;
        resize: vertical;
        font-family: inherit;
      }

      .prompt-textarea:focus {
        outline: none;
        border-color: #ff6b35;
      }

      /* 生成控制 */
      .control-group {
        margin-bottom: 16px;
      }

      .control-label {
        font-size: 11px;
        color: #888;
        margin-bottom: 6px;
        display: block;
      }

      .select-box {
        width: 100%;
        padding: 10px 12px;
        background: #252525;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      .select-box:focus {
        outline: none;
        border-color: #ff6b35;
      }

      .generate-btn {
        width: 100%;
        padding: 12px;
        background: #ff6b35;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
      }

      .generate-btn:hover {
        background: #ff8555;
      }

      .generate-btn.secondary {
        background: #333;
      }

      .generate-btn.secondary:hover {
        background: #444;
      }

      /* 关键帧切换 */
      .keyframe-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .keyframe-tab {
        flex: 1;
        padding: 10px;
        background: #252525;
        border: 1px solid #333;
        border-radius: 6px;
        color: #888;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }

      .keyframe-tab:hover {
        border-color: #555;
      }

      .keyframe-tab.active {
        background: #ff6b35;
        border-color: #ff6b35;
        color: #fff;
      }

      /* 滚动条样式 */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 左侧分镜导航 -->
      <aside class="sidebar-left">
        <div class="sidebar-header">
          <div class="sidebar-title">分镜列表</div>
          <div class="sidebar-subtitle">共 9 个分镜，已拆分 6 个</div>
        </div>
        <div class="shot-list">
          <div class="shot-item">
            <div class="shot-thumb">
              <img
                src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=100&h=75&fit=crop"
                alt=""
              />
            </div>
            <div class="shot-info">
              <div class="shot-number">001</div>
              <div class="shot-name">地铁闸机口-镜头1</div>
              <div class="shot-status">✓ 已生图</div>
            </div>
          </div>
          <div class="shot-item active">
            <div class="shot-thumb">
              <img
                src="https://images.unsplash.com/photo-1545987796-200677ee1011?w=100&h=75&fit=crop"
                alt=""
              />
            </div>
            <div class="shot-info">
              <div class="shot-number">002</div>
              <div class="shot-name">地铁闸机口-镜头2</div>
              <div class="shot-status">✓ 已生图</div>
            </div>
          </div>
          <div class="shot-item">
            <div class="shot-thumb">
              <div style="width: 100%; height: 100%; background: #2a2a2a"></div>
            </div>
            <div class="shot-info">
              <div class="shot-number">003</div>
              <div class="shot-name">早高峰地铁车厢</div>
              <div class="shot-status">○ 未拆分</div>
            </div>
          </div>
          <div class="shot-item">
            <div class="shot-thumb">
              <div style="width: 100%; height: 100%; background: #2a2a2a"></div>
            </div>
            <div class="shot-info">
              <div class="shot-number">004</div>
              <div class="shot-name">地铁站台</div>
              <div class="shot-status">○ 未拆分</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- 中央预览区 -->
      <main class="main-content">
        <!-- 顶部信息栏 -->
        <div class="top-bar">
          <div class="shot-title">
            <span class="shot-id">002</span>
            <span class="shot-scene">地铁闸机口-中景</span>
          </div>
          <div class="top-actions">
            <button class="btn btn-secondary">重新拆分</button>
            <button class="btn btn-primary">+ 新建分镜</button>
          </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-area">
          <img
            src="https://images.unsplash.com/photo-1545987796-200677ee1011?w=1200&h=800&fit=crop"
            alt="关键帧预览"
            class="preview-image"
          />

          <!-- 悬浮工具栏 -->
          <div class="floating-toolbar">
            <button class="toolbar-btn primary">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              生成图片
            </button>
            <button class="toolbar-btn">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
              编辑提示词
            </button>
            <button class="toolbar-btn">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                />
              </svg>
              删除
            </button>
          </div>

          <!-- 关键帧指示器 -->
          <div class="keyframe-indicator">关键帧 2 / 3</div>
        </div>

        <!-- 描述区 -->
        <div class="description-bar">
          <p class="description-text">
            李林低头查看手机，发现余额不足，尴尬地回头看向身后排队的人群。沈楠站在不远处，手里拿着地铁票，目光温和地看着这一幕。
          </p>
        </div>

        <!-- 底部历史栏 -->
        <div class="history-bar">
          <span class="history-label">历史版本</span>
          <div class="history-list">
            <div class="history-item">
              <span class="version-num">V1</span>
              <img
                src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=100&h=75&fit=crop"
                alt=""
              />
            </div>
            <div class="history-item active">
              <span class="version-num">V2</span>
              <img
                src="https://images.unsplash.com/photo-1545987796-200677ee1011?w=100&h=75&fit=crop"
                alt=""
              />
            </div>
            <div class="history-item">
              <span class="version-num">V3</span>
              <img
                src="https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=100&h=75&fit=crop"
                alt=""
              />
            </div>
            <div class="add-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </div>
          </div>
        </div>
      </main>

      <!-- 右侧面板 -->
      <aside class="sidebar-right">
        <!-- 关键帧切换 -->
        <div class="panel-section">
          <div class="keyframe-tabs">
            <div class="keyframe-tab">关键帧1</div>
            <div class="keyframe-tab active">关键帧2</div>
            <div class="keyframe-tab">关键帧3</div>
          </div>
        </div>

        <!-- 关联角色 -->
        <div class="panel-section">
          <div class="panel-title">关联角色</div>
          <div class="character-list">
            <div class="character-item">
              <div class="character-avatar">
                <img
                  src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=72&h=72&fit=crop&crop=face"
                  alt=""
                />
              </div>
              <div class="character-info">
                <div class="character-name">李林</div>
                <div class="character-role">男主角 · 程序员</div>
              </div>
            </div>
            <div class="character-item">
              <div class="character-avatar">
                <img
                  src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=72&h=72&fit=crop&crop=face"
                  alt=""
                />
              </div>
              <div class="character-info">
                <div class="character-name">沈楠</div>
                <div class="character-role">女主角 · 设计师</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 场景信息 -->
        <div class="panel-section">
          <div class="panel-title">场景信息</div>
          <div class="scene-info">
            <div class="scene-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
            </div>
            <div class="character-info">
              <div class="character-name">地铁闸机口</div>
              <div class="character-role">现代 · 室内</div>
            </div>
          </div>
        </div>

        <!-- 提示词编辑 -->
        <div class="panel-section">
          <div class="panel-title">画面提示词</div>
          <div class="prompt-box">
            <div class="prompt-header">
              <span class="prompt-label">图生图提示词</span>
              <div class="prompt-actions">
                <button class="icon-btn" title="复制">
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
                </button>
                <button class="icon-btn" title="重新生成">
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <polyline points="23 4 23 10 17 10" />
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                  </svg>
                </button>
              </div>
            </div>
            <textarea class="prompt-textarea">
A young man in a light gray shirt standing at a subway turnstile, looking down at his phone with a worried expression. Behind him, a young woman in a white blouse holds a subway ticket, watching him with a gentle smile. Morning rush hour atmosphere, soft natural lighting from the station windows, modern urban subway station interior.</textarea
            >
          </div>
        </div>

        <!-- 生成控制 -->
        <div class="panel-section">
          <div class="panel-title">图片生成</div>
          <div class="control-group">
            <label class="control-label">选择模型</label>
            <select class="select-box">
              <option>豆包 Seedream 4.0</option>

              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />

              <path d="M21 15l-5-5L5 21" />

        <div class="panel-section" style="flex: 1">

              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >

    <script>
      // 简单的交互效果
      document.querySelectorAll('.shot-item').forEach(item => {
        item.addEventListener('click', function () {
          document.querySelectorAll('.shot-item').forEach(i => i.classList.remove('active'));
          this.classList.add('active');
        });
      });

      document.querySelectorAll('.keyframe-tab').forEach(tab => {
        tab.addEventListener('click', function () {
          document.querySelectorAll('.keyframe-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
        });
      });

      document.querySelectorAll('.history-item').forEach(item => {
        item.addEventListener('click', function () {
          document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
          this.classList.add('active');
        });
      });
    </script>
  </body>
