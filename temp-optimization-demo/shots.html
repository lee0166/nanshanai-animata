<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kmeng AI Animata - 分镜管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'slate-50': '#fafafa',
                        'slate-100': '#f4f4f5',
                        'slate-200': '#e4e4e7',
                        'slate-300': '#d4d4d8',
                        'slate-400': '#a1a1aa',
                        'slate-500': '#71717a',
                        'slate-600': '#52525b',
                        'slate-700': '#3f3f46',
                        'slate-800': '#27272a',
                        'slate-850': '#202023',
                        'slate-900': '#18181b',
                        'slate-950': '#09090b',
                        'indigo-500': '#3b82f6',
                        'indigo-600': '#2563eb',
                        'indigo-700': '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #ECEDEE;
            transition: colors 0.3s;
        }
        .dark {
            background-color: #050505;
            color: #ECEDEE;
        }
        .bg-content1 {
            background-color: #18181b;
        }
        .bg-content2 {
            background-color: #27272a;
        }
        .bg-content3 {
            background-color: #3f3f46;
        }
        .text-foreground {
            color: #ECEDEE;
        }
        .text-primary {
            color: #3870e7;
        }
        .border-content3 {
            border-color: #3f3f46;
        }
        .shot-card {
            background-color: #27272a;
            border-radius: 8px;
            border: 1px solid #3f3f46;
            overflow: hidden;
            cursor: pointer;
        }
        .shot-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .shot-card.active {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .keyframe-item {
            width: 80px;
            height: 60px;
            background-color: #27272a;
            border-radius: 4px;
            margin: 4px;
            cursor: pointer;
            position: relative;
        }
        .keyframe-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .keyframe-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        .keyframe-status {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .keyframe-status.completed {
            background-color: #10b981;
        }
        .keyframe-status.generating {
            background-color: #f59e0b;
        }
        .keyframe-status.failed {
            background-color: #ef4444;
        }
    </style>
</head>
<body class="dark">
    <!-- 顶部导航栏 -->
    <nav class="bg-slate-900 h-16 flex items-center justify-between px-6">
        <div class="flex items-center">
            <button class="mr-4 text-slate-400 hover:text-foreground" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold text-foreground">Kmeng AI Animata</h1>
            <span class="ml-4 text-sm text-slate-400">项目: 科幻小说改编</span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="text-slate-400 hover:text-foreground">
                <i class="fas fa-moon"></i>
            </button>
            <button class="text-slate-400 hover:text-foreground">
                <i class="fas fa-language"></i>
            </button>
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                <i class="fas fa-plus mr-2"></i>新增分镜
            </button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="flex h-[calc(100vh-4rem)]">
        <!-- 左侧分镜列表 -->
        <div class="w-64 bg-content1 border-r border-content3 overflow-y-auto">
            <div class="p-4 border-b border-content3">
                <h2 class="text-lg font-semibold text-foreground">分镜列表</h2>
            </div>
            <div class="p-4">
                <div class="shot-card active mb-4">
                    <div class="h-32 bg-content2 flex items-center justify-center">
                        <i class="fas fa-film text-3xl text-slate-500"></i>
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-foreground">分镜 1</h3>
                        <p class="text-xs text-slate-400">开场场景</p>
                    </div>
                </div>
                <div class="shot-card mb-4">
                    <div class="h-32 bg-content2 flex items-center justify-center">
                        <i class="fas fa-film text-3xl text-slate-500"></i>
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-foreground">分镜 2</h3>
                        <p class="text-xs text-slate-400">对话场景</p>
                    </div>
                </div>
                <div class="shot-card mb-4">
                    <div class="h-32 bg-content2 flex items-center justify-center">
                        <i class="fas fa-film text-3xl text-slate-500"></i>
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-foreground">分镜 3</h3>
                        <p class="text-xs text-slate-400">动作场景</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 中间内容区 -->
        <div class="flex-1 flex flex-col">
            <!-- 工具栏 -->
            <div class="bg-content1 border-b border-content3 p-4">
                <div class="flex space-x-4">
                    <h2 class="text-lg font-semibold text-foreground">分镜 1 - 开场场景</h2>
                    <div class="flex-1"></div>
                    <button class="bg-content2 hover:bg-content3 px-3 py-1 rounded">
                        <i class="fas fa-copy mr-1"></i>复制
                    </button>
                    <button class="bg-content2 hover:bg-content3 px-3 py-1 rounded">
                        <i class="fas fa-trash mr-1"></i>删除
                    </button>
                </div>
            </div>

            <!-- 预览窗口 -->
            <div class="flex-1 bg-slate-950 flex items-center justify-center">
                <div class="w-3/4 aspect-video bg-content2 rounded-lg overflow-hidden">
                    <div class="w-full h-full flex items-center justify-center">
                        <i class="fas fa-play-circle text-6xl text-slate-500"></i>
                    </div>
                </div>
            </div>

            <!-- 关键帧时间轴 -->
            <div class="h-64 bg-content1 border-t border-content3 p-4">
                <h3 class="text-sm font-medium text-foreground mb-3">关键帧</h3>
                <div class="flex items-center space-x-4">
                    <div class="keyframe-item">
                        <div class="keyframe-status completed"></div>
                        <div class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-image text-slate-500"></i>
                        </div>
                    </div>
                    <div class="keyframe-item">
                        <div class="keyframe-status generating"></div>
                        <div class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-spinner fa-spin text-slate-500"></i>
                        </div>
                    </div>
                    <div class="keyframe-item">
                        <div class="keyframe-status completed"></div>
                        <div class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-image text-slate-500"></i>
                        </div>
                    </div>
                    <div class="keyframe-item">
                        <div class="keyframe-status completed"></div>
                        <div class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-image text-slate-500"></i>
                        </div>
                    </div>
                    <div class="keyframe-item">
                        <div class="keyframe-status completed"></div>
                        <div class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-image text-slate-500"></i>
                        </div>
                    </div>
                    <div class="keyframe-item">
                        <div class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-plus text-slate-500"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧生成面板 -->
        <div class="w-80 bg-content1 border-l border-content3">
            <div class="p-4 border-b border-content3">
                <h2 class="text-lg font-semibold text-foreground">视频生成</h2>
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">提示词</label>
                    <textarea class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground h-24" placeholder="描述场景..."></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">模型</label>
                    <select class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground">
                        <option>Volcengine - 视频生成</option>
                        <option>Vidu - 视频生成</option>
                        <option>ModelScope - 视频生成</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">时长</label>
                    <select class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground">
                        <option>5秒</option>
                        <option>10秒</option>
                        <option>15秒</option>
                        <option>30秒</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">分辨率</label>
                    <select class="w-full bg-content2 border border-content3 rounded px-3 py-2 text-foreground">
                        <option>720p</option>
                        <option>1080p</option>
                        <option>4K</option>
                    </select>
                </div>
                <div class="mt-6">
                    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-magic mr-2"></i>生成视频
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟交互
        document.querySelectorAll('.shot-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.shot-card').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
